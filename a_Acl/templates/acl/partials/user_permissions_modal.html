{% load static %}

<!-- Search Input Area -->
<div class="p-6 border-b border-slate-50 dark:border-gray-800">
    <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">
            <i class="fas fa-search text-sm"></i>
        </div>
        <input type="text" name="q" 
               id="user-search-input" 
               placeholder="Buscar por nome ou e-mail..." 
               class="w-full pl-12 pr-4 py-3 bg-slate-50 dark:bg-gray-800 border-none rounded-xl text-sm font-medium text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-indigo-500/20 transition-all"
               hx-get="{% url 'acl:manage-site-user' site.url %}"
               hx-trigger="keyup changed delay:500ms"
               hx-target="#search-results-container"
               hx-indicator="#search-spinner">
    </div>
    <div id="search-spinner" class="htmx-indicator mt-2 flex items-center gap-2 text-[10px] text-indigo-500 font-bold uppercase tracking-widest">
        <i class="fas fa-circle-notch fa-spin"></i> Buscando usuários...
    </div>
</div>

<!-- Search Results Area -->
<div id="search-results-container" class="max-h-[500px] overflow-y-auto pb-12">
    {% include 'acl/partials/user_search_results.html' %}
</div>
