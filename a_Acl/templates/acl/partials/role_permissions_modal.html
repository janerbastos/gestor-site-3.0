<div x-data="{ 
        open: true,
        searchTerm: '',
        close() { this.open = false; setTimeout(() => { $el.remove() }, 300) }
     }" 
     x-show="open" 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     class="fixed inset-0 z-[100] overflow-y-auto" 
     aria-labelledby="modal-title" role="dialog" aria-modal="true">
    
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" @click="close()"></div>

    <div class="flex min-h-screen items-center justify-center p-4">
        <div x-show="open" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 scale-95 translate-y-4"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             class="relative w-full max-w-2xl transform overflow-hidden rounded-[2.5rem] bg-white dark:bg-gray-800 shadow-2xl transition-all border border-slate-100 dark:border-gray-700">
            
            <!-- Header -->
            <div class="px-8 py-6 border-b border-slate-50 dark:border-gray-700/50 flex items-center justify-between bg-slate-50/50 dark:bg-gray-900/20">
                <div>
                    <h3 class="text-xl font-black text-slate-900 dark:text-white uppercase tracking-tight">Gerenciar Permissões</h3>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Perfil: {{ role.nome }}</p>
                </div>
                <button @click="close()" class="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-white transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>

            <!-- Search bar inside modal -->
            <div class="px-8 py-4 bg-white dark:bg-gray-800 border-b border-slate-50 dark:border-gray-700/50">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-filter text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                    </div>
                    <input type="text" x-model="searchTerm" placeholder="Filtrar permissões..." 
                           class="block w-full rounded-2xl border-0 py-2.5 pl-11 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-blue-600 sm:text-sm dark:bg-gray-900 dark:text-white dark:ring-gray-700">
                </div>
            </div>

            <form method="POST" action="{% url 'acl:manage-role-permissions' role.id %}">
                {% csrf_token %}
                
                <!-- Permissions List -->
                <div class="px-8 py-6 max-h-[50vh] overflow-y-auto">
                    {% regroup permissions by content_type.descricao as perm_groups %}
                    
                    <div class="space-y-8">
                        {% for group in perm_groups %}
                        <div x-data="{ 
                                groupName: '{{ group.grouper|default:"Geral"|lower }}',
                                get groupMatches() {
                                    if (searchTerm === '') return true;
                                    return this.groupName.includes(searchTerm.toLowerCase());
                                }
                             }"
                             x-show="searchTerm === '' || groupMatches || $el.innerText.toLowerCase().includes(searchTerm.toLowerCase())">
                            
                            <h4 class="text-[10px] font-black text-blue-600 dark:text-blue-400 uppercase tracking-[0.2em] mb-4 flex items-center">
                                <span class="w-8 h-px bg-blue-100 dark:bg-blue-900/30 mr-3"></span>
                                {{ group.grouper|default:"Geral" }}
                            </h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {% for perm in group.list %}
                                <label class="relative flex items-center p-3 rounded-2xl border border-slate-100 dark:border-gray-700/50 hover:bg-slate-50 dark:hover:bg-gray-700/30 cursor-pointer transition-all group"
                                       x-data="{ 
                                            permName: '{{ perm.nome|lower }}',
                                            permSlug: '{{ perm.slug|lower }}'
                                       }"
                                       x-show="searchTerm === '' || groupMatches || permName.includes(searchTerm.toLowerCase()) || permSlug.includes(searchTerm.toLowerCase())">
                                    <div class="flex items-center h-5">
                                        <input type="checkbox" name="permissions" value="{{ perm.id }}" 
                                               {% if perm.id in assigned_permissions %}checked{% endif %}
                                               class="h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-600 dark:bg-gray-900 dark:border-gray-700 cursor-pointer transition-all">
                                    </div>
                                    <div class="ml-3">
                                        <p class="text-sm font-bold text-slate-700 dark:text-gray-200 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">{{ perm.nome }}</p>
                                        <p class="text-[9px] font-medium text-slate-400 uppercase tracking-tighter">{{ perm.slug }}</p>
                                    </div>
                                </label>
                                {% endfor %}
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <!-- Footer / Actions -->
                <div class="px-8 py-6 bg-slate-50/50 dark:bg-gray-900/20 border-t border-slate-50 dark:border-gray-700/50 flex items-center justify-end gap-4">
                    <button type="button" @click="close()" class="px-6 py-3 text-xs font-black text-slate-500 uppercase tracking-widest hover:text-slate-700 dark:hover:text-gray-200 transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" class="flex items-center justify-center px-8 py-3 text-xs font-black text-white bg-blue-600 rounded-2xl hover:bg-blue-700 shadow-xl shadow-blue-500/20 transition-all active:scale-[0.98]">
                        <i class="fas fa-save mr-2"></i>
                        SALVAR ALTERAÇÕES
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
