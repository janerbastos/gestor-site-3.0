{% load static %}

<nav class="h-20 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-slate-100 dark:border-gray-700 sticky top-0 z-40 transition-colors duration-300">
    <div class="h-full px-6 flex items-center justify-between">
        
        <!-- Left Side: Breadcrumbs / Title -->
        <div class="flex items-center gap-4">
            <!-- Mobile Menu Trigger (Hamburger) -->
            <button class="lg:hidden p-2 text-slate-500 hover:bg-slate-50 dark:hover:bg-gray-700 rounded-xl transition-all">
                <i class="fas fa-bars text-xl"></i>
            </button>
            
            <div class="hidden sm:flex items-center gap-2">
                {% block breadcrumb %}
                    {% include 'site/components/beadcrumbs.html' with breadcrumbs=breadcrumbs %}
                {% endblock %}
            </div>
        </div>

        <!-- Right Side: Actions & User -->
        <div class="flex items-center gap-3">
            
            <!-- Quick Actions -->
            <div class="hidden md:flex items-center gap-1 pr-4 border-r border-slate-100 dark:border-gray-700">
                <button class="p-2.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/20 rounded-xl transition-all" title="Notificações">
                    <i class="fas fa-bell"></i>
                </button>
                <button class="p-2.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/20 rounded-xl transition-all" title="Ajuda">
                    <i class="fas fa-question-circle"></i>
                </button>
            </div>

            <!-- User Dropdown -->
            <div x-data="{ open: false }" class="relative ml-2">
                <button @click="open = !open" 
                        @click.away="open = false"
                        class="flex items-center gap-3 p-1.5 rounded-2xl hover:bg-slate-50 dark:hover:bg-gray-700/50 transition-all border border-transparent hover:border-slate-100 dark:hover:border-gray-600">
                    <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center text-white font-black text-sm shadow-lg shadow-blue-500/20">
                        {{ user.first_name|first|upper|default:"U" }}
                    </div>
                    <div class="hidden sm:block text-left">
                        <p class="text-xs font-black text-slate-900 dark:text-white leading-none capitalize">{{ user.first_name|default:user.email }}</p>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter mt-1">{% if user.is_superuser %}Administrador{% else %}Colaborador{% endif %}</p>
                    </div>
                    <i class="fas fa-chevron-down text-[10px] text-slate-300 ml-1 transition-transform" :class="{ 'rotate-180': open }"></i>
                </button>

                <!-- Dropdown Menu -->
                <div x-show="open" 
                     x-transition:enter="transition ease-out duration-200"
                     x-transition:enter-start="opacity-0 scale-95 translate-y-2"
                     x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                     x-transition:leave="transition ease-in duration-150"
                     x-transition:leave-start="opacity-100 scale-100 translate-y-0"
                     x-transition:leave-end="opacity-0 scale-95 translate-y-2"
                     class="absolute right-0 mt-3 w-56 origin-top-right rounded-3xl bg-white dark:bg-gray-800 shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-gray-700 py-3 z-50">
                    
                    <div class="px-4 py-2 mb-2 border-b border-slate-50 dark:border-gray-700/50">
                        <p class="text-[10px] font-black text-slate-400 dark:text-gray-500 uppercase tracking-widest">Minha Conta</p>
                    </div>

                    <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm font-bold text-slate-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:text-blue-600 dark:hover:text-blue-400 transition-all">
                        <i class="fas fa-user-circle w-5 opacity-50"></i>
                        Meu Perfil
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm font-bold text-slate-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:text-blue-600 dark:hover:text-blue-400 transition-all">
                        <i class="fas fa-key w-5 opacity-50"></i>
                        Alterar Senha
                    </a>

                    <div class="h-px bg-slate-50 dark:bg-gray-700/50 my-2"></div>

                    <a href="#" class="flex items-center gap-3 px-4 py-2.5 text-sm font-bold text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all">
                        <i class="fas fa-sign-out-alt w-5 opacity-50"></i>
                        Sair do Sistema
                    </a>
                </div>
            </div>

        </div>
    </div>
</nav>
