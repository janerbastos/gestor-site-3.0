{% load static %}

<aside :class="{ 'w-64': sidebarOpen, 'w-20': !sidebarOpen }" 
       class="hidden lg:flex flex-col fixed left-0 top-0 h-screen bg-white dark:bg-gray-800 border-r border-slate-100 dark:border-gray-700 transition-all duration-300 z-50">
    
    <!-- Branding Section -->
    <div class="h-20 flex items-center px-6 border-b border-slate-50 dark:border-gray-700/50">
        <div class="flex items-center gap-3 overflow-hidden">
            <div class="p-2 bg-blue-600 rounded-xl shadow-lg shadow-blue-500/20 flex-shrink-0">
                <img class="h-6 w-auto invert brightness-0" src="{% static 'img/brasao.png' %}" alt="Logo">
            </div>
            <div x-show="sidebarOpen" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-x-4" x-transition:enter-end="opacity-100 translate-x-0">
                <span class="text-sm font-black text-slate-900 dark:text-white tracking-tighter uppercase whitespace-nowrap">Gestor Sites</span>
                <span class="block text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-widest">v3.0</span>
            </div>
        </div>
    </div>

    <!-- Navigation Content -->
    <div class="flex-grow overflow-y-auto py-6 px-4 space-y-8">
        
        <!-- Section: Dashboard -->
        <div>
            <div x-show="sidebarOpen" class="px-2 mb-4 text-[10px] font-black text-slate-400 dark:text-gray-500 uppercase tracking-[0.2em]">Início</div>
            <nav class="space-y-1">
                <a href="{% url 'site:dashboard' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-2xl text-sm font-bold transition-all {% if request.path == '/' %} bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 {% else %} text-slate-500 hover:bg-slate-50 hover:text-slate-900 dark:text-gray-400 dark:hover:bg-gray-700/50 dark:hover:text-white {% endif %}">
                    <i class="fas fa-th-large w-5 text-center"></i>
                    <span x-show="sidebarOpen">Dashboard</span>
                </a>
            </nav>
        </div>

        <!-- Section: Gestão de Acesso -->
        <div>
            <div x-show="sidebarOpen" class="px-2 mb-4 text-[10px] font-black text-slate-400 dark:text-gray-500 uppercase tracking-[0.2em]">Gestão de Acesso</div>
            <nav class="space-y-1">
                <!-- Usuários -->
                <a href="{% url 'account:list-users' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-2xl text-sm font-bold transition-all {% if 'account' in request.resolver_match.app_name %} bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 {% else %} text-slate-500 hover:bg-slate-50 hover:text-slate-900 dark:text-gray-400 dark:hover:bg-gray-700/50 dark:hover:text-white {% endif %}">
                    <i class="fas fa-users w-5 text-center"></i>
                    <span x-show="sidebarOpen">Usuários</span>
                </a>
                <!-- Perfis (ACL) -->
                <a href="{% url 'acl:list-roles' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-2xl text-sm font-bold transition-all {% if 'acl' in request.resolver_match.app_name %} bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 {% else %} text-slate-500 hover:bg-slate-50 hover:text-slate-900 dark:text-gray-400 dark:hover:bg-gray-700/50 dark:hover:text-white {% endif %}">
                    <i class="fas fa-shield-alt w-5 text-center"></i>
                    <span x-show="sidebarOpen">Perfis de Acesso</span>
                </a>
            </nav>
        </div>

        <!-- Section: Configurações -->
        <div>
            <div x-show="sidebarOpen" class="px-2 mb-4 text-[10px] font-black text-slate-400 dark:text-gray-500 uppercase tracking-[0.2em]">Configurações</div>
            <nav class="space-y-1">
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 hover:text-slate-900 dark:text-gray-400 dark:hover:bg-gray-700/50 dark:hover:text-white transition-all">
                    <i class="fas fa-cog w-5 text-center"></i>
                    <span x-show="sidebarOpen">Configurações Gerais</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-2xl text-sm font-bold text-slate-500 hover:bg-slate-50 hover:text-slate-900 dark:text-gray-400 dark:hover:bg-gray-700/50 dark:hover:text-white transition-all">
                    <i class="fas fa-history w-5 text-center"></i>
                    <span x-show="sidebarOpen">Logs de Auditoria</span>
                </a>
            </nav>
        </div>
    </div>

    <!-- User Section / Footer -->
    <div class="p-4 border-t border-slate-50 dark:border-gray-700/50">
        <div class="flex items-center gap-3 p-2 rounded-2xl hover:bg-slate-50 dark:hover:bg-gray-700/50 transition-all cursor-pointer">
            <div class="h-10 w-10 rounded-xl bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-400 font-black flex-shrink-0">
                {{ user.first_name|first|upper|default:"U" }}
            </div>
            <div x-show="sidebarOpen" class="overflow-hidden">
                <p class="text-sm font-bold text-slate-900 dark:text-white truncate">{{ user.get_full_name|default:user.email }}</p>
                <p class="text-[10px] font-medium text-slate-400 truncate">{{ user.email }}</p>
            </div>
        </div>
        
        <!-- Toggle Sidebar Button -->
        <button @click="sidebarOpen = !sidebarOpen" class="mt-4 w-full flex items-center justify-center p-2 text-slate-400 hover:text-slate-600 dark:hover:text-white transition-colors">
            <i class="fas" :class="sidebarOpen ? 'fa-angle-double-left' : 'fa-angle-double-right'"></i>
        </button>
    </div>
</aside>
