<div class="space-y-4" id="documento-destaque">
    
    {% if doc.arquivo %}
    <div class="p-5 rounded-2xl border border-emerald-200 dark:border-emerald-900/40 bg-emerald-50 dark:bg-emerald-900/10 max-w-2xl">
        
        <div class="flex items-start gap-4">
            
            <div class="h-12 w-12 rounded-xl bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-600 dark:text-emerald-400 shrink-0">
                <i class="fas fa-file-alt text-lg"></i>
            </div>

            <div class="flex-1">
                
                <div class="flex items-center gap-2 mb-2">
                    <span class="px-2 py-1 rounded-full bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300 text-[10px] font-black uppercase tracking-widest">
                        Documento Selecionado
                    </span>
                </div>

                <p class="text-sm text-slate-700 dark:text-slate-300 leading-relaxed">
                    Um documento já foi vinculado como arquivo de destaque deste conteúdo.
                </p>

                <a href="{{ doc.arquivo.url }}"
                   target="_blank"
                   class="inline-flex items-center gap-2 mt-4 px-4 py-2 rounded-xl bg-white dark:bg-gray-800 border border-slate-200 dark:border-gray-700 text-xs font-black uppercase tracking-widest text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-gray-700 transition-all">

                    <i class="fas fa-arrow-up-right-from-square text-indigo-500"></i>
                    Abrir Documento
                </a>
            </div>
        </div>
    </div>
    {% endif %}

    <input 
        type="hidden" 
        name="arquivo_destaque" 
        id="id_arquivo_destaque"
        value="{{ doc.arquivo.url|default:'' }}"
    >
</div>
