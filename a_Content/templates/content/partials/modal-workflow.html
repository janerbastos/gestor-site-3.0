<!-- Modal Structure -->
<template x-teleport="body">
    <div x-show="modalOpen" 
            class="fixed inset-0 z-[100] overflow-y-auto" 
            x-cloak>
        <div class="flex items-center justify-center min-h-screen p-4">
            <!-- Overlay -->
            <div x-show="modalOpen" 
                    x-transition:enter="ease-out duration-300"
                    x-transition:enter-start="opacity-0"
                    x-transition:enter-end="opacity-100"
                    x-transition:leave="ease-in duration-200"
                    x-transition:leave-start="opacity-100"
                    x-transition:leave-end="opacity-0"
                    @click="modalOpen = false"
                    class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity"></div>

            <!-- Modal Content -->
            <div x-show="modalOpen"
                    x-transition:enter="ease-out duration-300"
                    x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                    x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                    x-transition:leave="ease-in duration-200"
                    x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                    x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                    class="relative bg-white dark:bg-gray-900 rounded-[2.5rem] shadow-2xl w-full max-w-3xl overflow-hidden transform transition-all border border-slate-100 dark:border-gray-800">
                
                <!-- Modal Header -->
                <div class="px-8 py-6 border-b border-slate-50 dark:border-gray-800 flex items-center justify-between bg-slate-50/50 dark:bg-gray-800/50">
                    <div>
                        <h3 class="text-xl font-black text-slate-900 dark:text-white uppercase tracking-tight">Fluxo de Publicação</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Defina o estado do conteúdo no fluxo de publicação do portal</p>
                    </div>
                    <button @click="modalOpen = false" class="h-10 w-10 flex items-center justify-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-gray-800 rounded-xl transition-all">
                        <i class="fas fa-times text-lg"></i>
                    </button>
                </div>

                <!-- Modal Body -->
                <div id="modal-body-content">
                    <!-- HTMX will load user_permissions_modal.html here -->
                    <div class="p-20 text-center">
                        <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-solid border-indigo-600 border-r-transparent align-[-0.125em] motion-reduce:animate-[spin_1.5s_linear_infinite]"></div>
                        <p class="mt-4 text-xs font-black text-slate-400 uppercase tracking-widest">Carregando interface...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
