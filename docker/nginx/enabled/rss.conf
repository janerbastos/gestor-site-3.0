server {
	listen		443 ssl;
	server_name	rss.ufopa.edu.br;

    autoindex off;

	ssl_certificate /apps/mamba/icpedu/www.ufopa.edu.br.crt;
	ssl_certificate_key /apps/mamba/icpedu/www.ufopa.edu.br.key;

    # Configuração do proxy reverso para o backend Django

    location / {
        proxy_pass http://django/latest/rss/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
    }

    location /static/ {
        alias /home/mamba/staticfiles/static/;
    }

    location /media/{
        alias /home/mamba/staticfiles/media/;
    }

    
}