<div class="bg-gradient-to-br from-indigo-600 to-blue-700 rounded-3xl p-6 text-white shadow-xl shadow-indigo-500/20">

    <p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-60 mb-4">
        Armazenamento
    </p>

    <div class="flex items-end justify-between mb-2">

        <span class="text-2xl font-black">
            {{ storage.media_percent_used }} %
        </span>

        <span class="text-[10px] font-bold opacity-80 uppercase">
            {{ storage.media_used_gb }} GB /
            {{ storage.partition_total_gb }} GB
        </span>

    </div>

    <div class="h-2 bg-white/20 rounded-full overflow-hidden">

        <div
            class="h-full bg-white rounded-full shadow-sm"
            style="width: {{ storage.media_percent_used }}%;"
        ></div>

    </div>

</div>
