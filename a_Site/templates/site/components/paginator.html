    <!-- Pagination -->
    {% if sites.has_other_pages %}
    <div class="flex items-center justify-center pt-6">
        <nav class="flex items-center gap-1">
            {% if sites.has_previous %}
            <a href="?page={{ sites.previous_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}" class="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors">
                <i class="fas fa-chevron-left"></i>
            </a>
            {% endif %}

            {% for i in sites.paginator.page_range %}
                {% if sites.number == i %}
                <span class="px-3.5 py-1.5 bg-indigo-600 text-white text-sm font-medium rounded-lg shadow-sm">{{ i }}</span>
                {% elif i > sites.number|add:'-3' and i < sites.number|add:'3' %}
                <a href="?page={{ i }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}" class="px-3.5 py-1.5 text-gray-600 hover:bg-gray-100 text-sm font-medium rounded-lg transition-colors">{{ i }}</a>
                {% endif %}
            {% endfor %}

            {% if sites.has_next %}
            <a href="?page={{ sites.next_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}" class="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors">
                <i class="fas fa-chevron-right"></i>
            </a>
            {% endif %}
        </nav>
    </div>
    {% endif %}
